name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch version in installer script
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          (Get-Content mac-installer.iss) `
            -replace '#define AppVersion ".*"', "#define AppVersion `"$ver`"" |
            Set-Content mac-installer.iss

      - name: Ensure placeholder assets exist
        shell: pwsh
        run: |
          # Inno Setup needs these files present at compile time
          if (-not (Test-Path "logo.png"))  { Copy-Item "logo_256.png" "logo.png" -ErrorAction SilentlyContinue }
          if (-not (Test-Path ".env.example")) { Copy-Item ".env.example.ci" ".env.example" -ErrorAction SilentlyContinue }

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $url = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\issetup.exe"
          Start-Process -FilePath "$env:TEMP\issetup.exe" `
            -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" `
            -Wait

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc mac-installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename output artifact
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $src = "dist\MAC-Setup-$ver.exe"
          $dst = "dist\MAC-$ver-Setup.exe"
          if (Test-Path $src) { Rename-Item $src $dst }
          Get-ChildItem dist\

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAC-Installer-${{ steps.version.outputs.VERSION }}
          path: dist\*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-installer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: MAC-Installer-${{ steps.version.outputs.VERSION }}
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[?v?${VERSION}\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="MAC v${VERSION} — self-hosted AI inference platform for Windows.\n\nSee [WALKTHROUGH.md](WALKTHROUGH.md) for setup instructions."
          fi
          {
            echo "NOTES<<EOF"
            echo -e "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MAC v${{ steps.version.outputs.VERSION }}"
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.exe
          generate_release_notes: true
