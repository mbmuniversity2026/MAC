name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Installer & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch version in installer script
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          (Get-Content mac-installer.iss -Raw) `
            -replace '#define AppVersion "[^"]*"', "#define AppVersion `"$ver`"" |
            Set-Content mac-installer.iss -NoNewline

      - name: Ensure build-time assets exist
        shell: pwsh
        run: |
          if (-not (Test-Path "logo.png")) {
            Copy-Item "logo_256.png" "logo.png"
          }

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $url  = "https://files.jrsoftware.org/is/6/innosetup-6.3.3.exe"
          $dest = "$env:TEMP\issetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Start-Process -FilePath $dest `
            -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" `
            -Wait

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc mac-installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename installer to versioned name
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $candidates = Get-ChildItem dist\*.exe
          foreach ($f in $candidates) {
            $newName = "MAC-$ver-Setup.exe"
            Rename-Item $f.FullName $newName -ErrorAction SilentlyContinue
          }
          Get-ChildItem dist\

      - name: Write release notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Try to extract this version's section from CHANGELOG.md
          NOTES=$(awk "/^## \[?v?${VERSION}\]?/{found=1;next} /^## \[/{if(found)exit} found{print}" CHANGELOG.md 2>/dev/null)
          if [ -z "$NOTES" ]; then
            NOTES="## MAC v${VERSION}

Self-hosted AI inference platform for Windows — run LLMs locally on your campus network.

### Install
1. Download \`MAC-${VERSION}-Setup.exe\` below and run it
2. Choose **Host** (full server) or **Worker** (GPU/CPU node) during setup
3. Docker Desktop must be running before first launch

See [WALKTHROUGH.md](https://github.com/${{ github.repository }}/blob/master/WALKTHROUGH.md) for the full setup guide."
          fi
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "MAC v${{ steps.version.outputs.VERSION }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*.exe
