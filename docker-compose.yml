# ═══════════════════════════════════════════════════════════
#  MAC — MBM AI Cloud  |  Host Server  (RTX 3060 12 GB)
# ═══════════════════════════════════════════════════════════
#  GPU budget (12 GB):
#    Sarvam-2B  (voice / chat LLM)  ≈ 4 GB   — always-on
#    Veena TTS  (3B, 4-bit)         ≈ 2 GB   — always-on
#    Whisper STT (CPU)              ≈ 0 GB VRAM
#    Headroom / OS                  ≈ 6 GB   ✓
#
#  Start:   start-mac.bat   (auto-detects GPU → adds --profile gpu)
#  Stop:    stop-mac.bat
# ═══════════════════════════════════════════════════════════

services:

  # ── MAC API Server ──────────────────────────────────────
  mac:
    build: .
    container_name: mac-api
    ports:
      - "${APP_HOST:-0.0.0.0}:8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mac:mac_password@postgres:5432/mac_db
      - REDIS_URL=redis://redis:6379/0
      - VLLM_BASE_URL=http://vllm-speed:8001
      - VLLM_SPEED_URL=http://vllm-speed:8001
      - VLLM_CODE_URL=http://vllm-speed:8001
      - VLLM_REASONING_URL=http://vllm-speed:8001
      - VLLM_INTELLIGENCE_URL=http://vllm-speed:8001
      - WHISPER_URL=http://whisper:8000
      - TTS_URL=http://tts:8000
      - EMBEDDING_URL=http://vllm-speed:8001
      - QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - MAC_ENABLED_MODELS=sarvam:2b,qwen2.5:7b,whisper-small,veena-tts
      - MAC_AUTO_FALLBACK=sarvam:2b
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data/uploads/copy_check:/app/uploads/copy_check
      - ./data/uploads/rag:/app/uploads/rag
      - ./data/uploads/attendance:/app/uploads/attendance
      - ./data/uploads/fileshare:/app/uploads/fileshare
      - ./data/uploads/syllabus:/app/uploads/syllabus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  # ═══════════════════════════════════════════════════════
  #  vLLM — Sarvam-2B  (bilingual Hindi/English voice LLM)
  # ═══════════════════════════════════════════════════════
  # Start with: docker compose --profile gpu up -d
  # Without GPU: MAC runs in API-key-only mode.
  vllm-speed:
    image: vllm/vllm-openai:latest
    container_name: mac-vllm-speed
    profiles: ["gpu"]
    ports:
      - "${VLLM_SPEED_PORT:-8001}:${VLLM_SPEED_PORT:-8001}"
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_SPEED_MODEL:-sarvamai/sarvam-2b-v0.5}
      --port ${VLLM_SPEED_PORT:-8001}
      --gpu-memory-utilization 0.55
      --max-model-len 4096
      --trust-remote-code
      --enforce-eager
      --dtype auto
      --served-model-name sarvamai/sarvam-2b-v0.5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  # ═══════════════════════════════════════════════════════
  #  SPEECH SERVICES
  # ═══════════════════════════════════════════════════════

  # ── Whisper STT (CPU — saves GPU for LLM + TTS) ────────
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: mac-whisper
    ports:
      - "${WHISPER_PORT:-8005}:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-small}
      - WHISPER__DEVICE=cpu
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  # ── Veena TTS — Hindi/English neural voice (maya-research/Veena) ──
  # Builds locally from ./veena_tts/. Downloads model weights on first run.
  # With GPU: 4-bit, ~2 GB VRAM.  Without GPU: CPU inference (slower).
  tts:
    build: ./veena_tts
    container_name: mac-tts
    ports:
      - "${TTS_PORT:-8006}:8000"
    environment:
      - HF_HOME=/root/.cache/huggingface
      - VEENA_MODEL=${VEENA_MODEL:-maya-research/Veena}
      - VEENA_DEVICE=${VEENA_DEVICE:-auto}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      - HF_DATASETS_OFFLINE=${HF_DATASETS_OFFLINE:-0}
    volumes:
      - hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  # ═══════════════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: mac-postgres
    environment:
      POSTGRES_USER: mac
      POSTGRES_PASSWORD: mac_password
      POSTGRES_DB: mac_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mac -d mac_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mac-pgadmin
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5051}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-mac.admin@mbm.ac.in}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-ChangeThisStrongPassword!}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - mac-net

  redis:
    image: redis:7-alpine
    container_name: mac-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  nginx:
    image: nginx:alpine
    container_name: mac-nginx
    ports:
      - "${APP_HOST:-0.0.0.0}:${APP_PORT:-80}:80"
      - "${APP_HOST:-0.0.0.0}:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend:/app:ro
    depends_on:
      mac:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mac-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

  searxng:
    image: searxng/searxng:latest
    container_name: mac-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - searxngdata:/etc/searxng
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mac-net

volumes:
  pgdata:
  pgadmin-data:
  redisdata:
  qdrantdata:
  searxngdata:
  hf-cache:       # Shared HuggingFace model cache (Sarvam-2B + Veena + Whisper)
  tts-voices:

networks:
  mac-net:
    driver: bridge
