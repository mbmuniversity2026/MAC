events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    charset_types text/css application/javascript application/json text/plain;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream mac_api {
        server mac:8000;
        keepalive 32;
    }

    # ── HTTP server ──
    server {
        listen 80;
        server_name _;

        root /app;

        # ── Special pages: rewrite to actual files BEFORE try_files ──
        rewrite ^/install-cert$ /install-cert.html last;
        rewrite ^/join$         /worker.html        last;

        # CA cert download
        location = /ca.crt {
            alias /etc/nginx/ssl/ca.crt;
            default_type application/x-x509-ca-cert;
            add_header Content-Disposition 'attachment; filename="MAC-CA.crt"';
        }

        # Service worker — must be no-cache, root scope
        location = /sw.js {
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location = /static/sw.js {
            alias /app/sw.js;
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Manifest — no-cache so updates propagate
        location = /manifest.json {
            add_header Cache-Control "no-cache, must-revalidate";
        }
        location = /static/manifest.json {
            alias /app/manifest.json;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # App source files — no-cache, etag-validated
        location ~ ^/static/(app\.js|style\.css|js/.+\.js)$ {
            alias /app/$1;
            add_header Cache-Control "no-cache, must-revalidate";
            etag on;
        }

        # Bundled libs — immutable long-cache
        location /static/libs/ {
            alias /app/libs/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Static assets — week-long cache
        location /static/ {
            alias /app/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Voice WebSocket — must come before /api/ to avoid Connection:'' override
        location /api/v1/voice/stream {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Admin terminal WebSocket
        location /api/v1/admin/terminal/ws {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API proxy with SSE streaming
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API docs
        location /docs  { proxy_pass http://mac_api; proxy_set_header Host $host; }
        location /redoc { proxy_pass http://mac_api; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://mac_api; proxy_set_header Host $host; }

        location /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # SPA fallback — everything else serves index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ── HTTPS server (LAN access — PWA install requires HTTPS) ──
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/mac.crt;
        ssl_certificate_key /etc/nginx/ssl/mac.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root /app;

        # ── Special pages ──
        rewrite ^/install-cert$ /install-cert.html last;
        rewrite ^/join$         /worker.html        last;

        location = /ca.crt {
            alias /etc/nginx/ssl/ca.crt;
            default_type application/x-x509-ca-cert;
            add_header Content-Disposition 'attachment; filename="MAC-CA.crt"';
        }

        location = /sw.js {
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location = /static/sw.js {
            alias /app/sw.js;
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /manifest.json {
            add_header Cache-Control "no-cache, must-revalidate";
        }
        location = /static/manifest.json {
            alias /app/manifest.json;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location ~ ^/static/(app\.js|style\.css|js/.+\.js)$ {
            alias /app/$1;
            add_header Cache-Control "no-cache, must-revalidate";
            etag on;
        }

        location /static/libs/ {
            alias /app/libs/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            alias /app/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Voice WebSocket — must come before /api/ to avoid Connection:'' override
        location /api/v1/voice/stream {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Admin terminal WebSocket
        location /api/v1/admin/terminal/ws {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        location /ws/ {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /docs  { proxy_pass http://mac_api; proxy_set_header Host $host; }
        location /redoc { proxy_pass http://mac_api; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://mac_api; proxy_set_header Host $host; }

        location /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
