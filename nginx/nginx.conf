events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    charset_types text/html text/css application/javascript application/json text/plain;
    sendfile      on;
    keepalive_timeout  65;

    # Rate limiting zone (10 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream mac_api {
        server mac:8000;
    }

    server {
        listen 80;
        server_name _;

        # Max upload size (for audio/image uploads — STT allows up to 50 MB)
        client_max_body_size 50m;

        # Vanilla JS frontend (no build step — files served directly)
        root /app;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # /static/* → served from /app/ root (FastAPI mounts /static to frontend dir)
        location /static/ {
            alias /app/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Libs — long cache (content-addressed filenames)
        location /static/libs/ {
            alias /app/libs/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Service worker — no-cache so updates propagate instantly
        location = /sw.js {
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location = /static/sw.js {
            alias /app/sw.js;
            add_header Service-Worker-Allowed /;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Manifest — short cache
        location = /manifest.json {
            add_header Cache-Control "public, max-age=3600";
        }
        location = /static/manifest.json {
            alias /app/manifest.json;
            add_header Cache-Control "public, max-age=3600";
        }

        # API proxy — all /api requests go to FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';

            # SSE + streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # WebSocket for notebook kernels
        location /ws/ {
            proxy_pass http://mac_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Docs
        location /docs {
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://mac_api;
            proxy_set_header Host $host;
        }

        # Health check
        location /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
